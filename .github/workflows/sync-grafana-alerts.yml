              --output json)

            ETAG=$(echo "$APP_JSON" | jq -r '.etag // "*"')
            INGRESS=$(echo "$APP_JSON" | jq -c '.properties.configuration.ingress // {}')
            CURRENT_RULES=$(echo "$INGRESS" | jq -c '.ipSecurityRestrictions // []')
            FILTERED_RULES=$(echo "$CURRENT_RULES" | jq -c --arg rule "$RULE_NAME" --arg cidr "$RUNNER_CIDR" '
              [.[] |
                select((.name // "") != $rule) |
                select((.ipAddressRange // .ipAddress // "") != $cidr)
              ]')

            REMOVED_COUNT=$(echo "$CURRENT_RULES" "$FILTERED_RULES" | jq -s '.[0] | length - (.[1] | length)')
            if [[ "$REMOVED_COUNT" == "0" ]]; then
              echo "::notice::No matching whitelist rule found to remove"
              PATCHED="true"
              break
            fi

            NEW_INGRESS=$(echo "$INGRESS" | jq -c --argjson rules "$FILTERED_RULES" '. + {ipSecurityRestrictions: $rules}')
            PATCH_BODY=$(jq -cn --argjson ingress "$NEW_INGRESS" '{properties:{configuration:{ingress:$ingress}}}')

            if az rest \
