name: Sync Grafana Alert Rules

permissions:
  id-token: write
  contents: read

on:
  schedule:
    - cron: '0 2 * * *'
  workflow_call:
    inputs:
      subscription:
        type: string
        required: true
        description: 'Which subscription to sync (ca804030 or ca808046)'
  workflow_dispatch:
    inputs:
      subscription:
        type: choice
        required: true
        description: 'Select subscription to sync'
        options:
          - 'CA804030 (c9f80f0b-7d34-4410-a79c-ca23fb550d20)'
          - 'CA808046 (fc6b18ca-199c-4123-8097-834cfc7ac213)'

env:
  GRAFANA_URL: ${{ secrets.GRAFANA_URL }}
  AZURE_DATASOURCE_UID: ${{ secrets.AZURE_DATASOURCE_UID }}

jobs:
  sync-ca804030:
    if: |
      github.event_name == 'schedule' ||
      (github.event_name == 'workflow_dispatch' && startsWith(inputs.subscription, 'CA804030')) ||
      (github.event_name == 'workflow_call' && inputs.subscription == 'ca804030')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Validate Required Secrets (CA804030)
        env:
          GRAFANA_URL_SECRET: ${{ secrets.GRAFANA_URL }}
          AZURE_DATASOURCE_UID_SECRET: ${{ secrets.AZURE_DATASOURCE_UID }}
          GRAFANA_TOKEN_SECRET: ${{ secrets.GRAFANA_TOKEN }}
          AZURE_CLIENT_ID_SECRET: ${{ secrets.AZURE_CLIENT_ID_CA804030 }}
          AZURE_TENANT_ID_SECRET: ${{ secrets.AZURE_TENANT_ID }}
        run: |
          missing=()
          [[ -z "$GRAFANA_URL_SECRET" ]] && missing+=("GRAFANA_URL")
          [[ -z "$AZURE_DATASOURCE_UID_SECRET" ]] && missing+=("AZURE_DATASOURCE_UID")
          [[ -z "$GRAFANA_TOKEN_SECRET" ]] && missing+=("GRAFANA_TOKEN")
          [[ -z "$AZURE_CLIENT_ID_SECRET" ]] && missing+=("AZURE_CLIENT_ID_CA804030")
          [[ -z "$AZURE_TENANT_ID_SECRET" ]] && missing+=("AZURE_TENANT_ID")

          if (( ${#missing[@]} > 0 )); then
            echo "::error::Missing required repository secrets: ${missing[*]}"
            exit 1
          fi

          echo "Required secrets check passed."

      - name: Azure Login (CA804030)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID_CA804030 }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: c9f80f0b-7d34-4410-a79c-ca23fb550d20
          enable-AzPSSession: false

      - name: Discover Resources
        run: |
          bash scripts/discover_resources.sh \
            --subscription c9f80f0b-7d34-4410-a79c-ca23fb550d20 \
            --output inventory.json

      - name: Plan (Diff)
        run: bash scripts/sync_grafana_alerts.sh plan
        env:
          GRAFANA_TOKEN: ${{ secrets.GRAFANA_TOKEN }}

      - name: Apply Changes
        run: bash scripts/sync_grafana_alerts.sh apply
        env:
          GRAFANA_TOKEN: ${{ secrets.GRAFANA_TOKEN }}

      - name: Summary
        run: bash scripts/sync_grafana_alerts.sh summary >> $GITHUB_STEP_SUMMARY

  sync-ca808046:
    if: |
      github.event_name == 'schedule' ||
      (github.event_name == 'workflow_dispatch' && startsWith(inputs.subscription, 'CA808046')) ||
      (github.event_name == 'workflow_call' && inputs.subscription == 'ca808046')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Validate Required Secrets (CA808046)
        env:
          GRAFANA_URL_SECRET: ${{ secrets.GRAFANA_URL }}
          AZURE_DATASOURCE_UID_SECRET: ${{ secrets.AZURE_DATASOURCE_UID }}
          GRAFANA_TOKEN_SECRET: ${{ secrets.GRAFANA_TOKEN }}
          AZURE_CLIENT_ID_SECRET: ${{ secrets.AZURE_CLIENT_ID_CA808046 }}
          AZURE_TENANT_ID_SECRET: ${{ secrets.AZURE_TENANT_ID_CA808046 }}
        run: |
          missing=()
          [[ -z "$GRAFANA_URL_SECRET" ]] && missing+=("GRAFANA_URL")
          [[ -z "$AZURE_DATASOURCE_UID_SECRET" ]] && missing+=("AZURE_DATASOURCE_UID")
          [[ -z "$GRAFANA_TOKEN_SECRET" ]] && missing+=("GRAFANA_TOKEN")
          [[ -z "$AZURE_CLIENT_ID_SECRET" ]] && missing+=("AZURE_CLIENT_ID_CA808046")
          [[ -z "$AZURE_TENANT_ID_SECRET" ]] && missing+=("AZURE_TENANT_ID_CA808046")

          if (( ${#missing[@]} > 0 )); then
            echo "::error::Missing required repository secrets: ${missing[*]}"
            exit 1
          fi

          echo "Required secrets check passed."

      - name: Azure Login (CA808046)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID_CA808046 }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID_CA808046 }}
          subscription-id: fc6b18ca-199c-4123-8097-834cfc7ac213
          enable-AzPSSession: false

      - name: Discover Resources
        run: |
          bash scripts/discover_resources.sh \
            --subscription fc6b18ca-199c-4123-8097-834cfc7ac213 \
            --output inventory.json

      - name: Plan (Diff)
        run: bash scripts/sync_grafana_alerts.sh plan
        env:
          GRAFANA_TOKEN: ${{ secrets.GRAFANA_TOKEN }}

      - name: Apply Changes
        run: bash scripts/sync_grafana_alerts.sh apply
        env:
          GRAFANA_TOKEN: ${{ secrets.GRAFANA_TOKEN }}

      - name: Summary
        run: bash scripts/sync_grafana_alerts.sh summary >> $GITHUB_STEP_SUMMARY
